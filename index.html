<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcial 1 - Programación 3</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <main class="container">
        <section class="form-section" id="register-section">
            <h2>Registro de Usuario</h2>
            <form id="register-form" novalidate>
                <div class="form-group">
                    <label for="reg-name">Nombre y Apellido:</label>
                    <input type="text" id="reg-name">
                    <span class="error-message" id="error-reg-name"></span>
                </div>

                <div class="form-group">
                    <label for="reg-email">Email:</label>
                    <input type="email" id="reg-email">
                    <span class="error-message" id="error-reg-email"></span>
                </div>

                <div class="form-group">
                    <label for="reg-password">Contraseña (Mín. 8 caracteres, 1 número):</label>
                    <input type="password" id="reg-password">
                    <span class="error-message" id="error-reg-password"></span>
                </div>

                <div class="form-group">
                    <label for="reg-confirm">Confirmar Contraseña:</label>
                    <input type="password" id="reg-confirm">
                    <span class="error-message" id="error-reg-confirm"></span>
                </div>

                <div class="form-group">
                    <label for="reg-dob">Fecha de Nacimiento:</label>
                    <input type="date" id="reg-dob">
                    <span class="error-message" id="error-reg-dob"></span>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="reg-terms">
                    <label for="reg-terms">Acepto los términos y condiciones</label>
                    <span class="error-message" id="error-reg-terms"></span>
                </div>

                <button type="submit" id="btn-register">Registrarse</button>
            </form>
        </section>

        <hr class="divider">

        <section class="form-section" id="login-section">
            <h2>Iniciar Sesión</h2>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="log-email">Email:</label>
                    <input type="email" id="log-email">
                    <span class="error-message" id="error-log-email"></span>
                </div>

                <div class="form-group">
                    <label for="log-password">Contraseña:</label>
                    <input type="password" id="log-password">
                    <span class="error-message" id="error-log-password"></span>
                </div>

                <button type="submit" id="btn-login">Ingresar</button>
            </form>
        </section>
    </main>
</body>
</html>
